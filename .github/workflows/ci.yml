name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/ci
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "eslint.config.js"
      - "Dockerfile"
      - "nginx.conf"
      - ".dockerignore"
      - ".github/workflows/ci.yml"
      - ".github/workflows/cd.yml"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "eslint.config.js"
      - "Dockerfile"
      - "nginx.conf"
      - ".dockerignore"
      - ".github/workflows/ci.yml"
      - ".github/workflows/cd.yml"

jobs:
  quality:
    name: Quality (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Application
        run: npm run build

  docker:
    name: Docker Build
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          build-args: |
            VITE_API_URL=/api
          labels: |
            app=gestion-practicas
            service=frontend
          tags: practicas-dci:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
